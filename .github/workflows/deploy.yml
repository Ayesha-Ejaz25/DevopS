name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Deploy to EC2
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
         sudo docker rm -f myapp || true
         sudo docker rmi -f ${{ secrets.DOCKER_USERNAME }}/html-app || true
         sudo docker pull ${{ secrets.DOCKER_USERNAME }}/html-app:latest
         sudo docker run -d -p 80:80 --name myapp ${{ secrets.DOCKER_USERNAME }}/html-app:latest
